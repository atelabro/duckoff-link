<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DuckOff</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      overflow: hidden;
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    #content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      padding: 40px 24px;
      display: none;
    }

    #content img.logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #content h1 {
      font-size: 2.4rem;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    #content p {
      font-size: 1.1rem;
      margin-bottom: 32px;
      color: #ccc;
    }

    .badges {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .badges a img {
      height: 52px;
    }
  </style>
  <script>
    var iosUrl = "https://apps.apple.com/app/id6760356647";
    var androidUrl = "https://play.google.com/store/apps/details?id=com.alab.duckoff";
    var ua = navigator.userAgent || navigator.vendor || window.opera;

    if (/android/i.test(ua)) {
      window.location.replace(androidUrl);
    } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
      window.location.replace(iosUrl);
    } else {
      document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("content").style.display = "block";
      });
    }
  </script>
</head>
<body>
  <video id="bg-video" autoplay muted loop playsinline poster="assets/IMG_6405.png">
    <source src="assets/background.mp4" type="video/mp4">
  </video>
  <div id="overlay"></div>
  <div id="content">
    <img class="logo" src="assets/logo.png" alt="DuckOff logo">
    <h1>DuckOff</h1>
    <p>Choose your platform:</p>
    <div class="badges">
      <a href="https://apps.apple.com/app/id6760356647">
        <img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-example-preferred_2x.png" alt="Download on the App Store">
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.alab.duckoff">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
      </a>
    </div>
  </div>
</body>
</html>
